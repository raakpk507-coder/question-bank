<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question Bank</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; }

    #header { background: #1a56db; color: white; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
    #header h1 { font-size: 15px; font-weight: bold; }
    #header span { font-size: 11px; opacity: 0.8; }

    #main-tabs { display: flex; background: #1a56db; border-bottom: 2px solid #1240a0; }
    .main-tab { flex: 1; padding: 8px 4px; font-size: 12px; font-weight: bold; cursor: pointer; color: rgba(255,255,255,0.6); text-align: center; border-bottom: 3px solid transparent; }
    .main-tab.active { color: #fff; border-bottom: 3px solid #fff; }

    .page { display: none; height: calc(100vh - 80px); overflow-y: auto; }
    .page.active { display: block; }

    /* Browse */
    #search-bar { padding: 8px 10px; background: #fff; border-bottom: 1px solid #ddd; }
    #search-bar input { width: 100%; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; outline: none; }
    #paper-bar { padding: 6px 10px; background: #fff8ec; border-bottom: 1px solid #ffe0a0; display: flex; align-items: center; gap: 6px; }
    #paper-bar label { font-size: 11px; color: #888; white-space: nowrap; }
    #paper-name { flex: 1; font-size: 11px; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
    #filter-tabs { display: flex; background: #fff; border-bottom: 2px solid #e0e0e0; padding: 0 10px; gap: 4px; }
    .tab { padding: 7px 10px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #555; }
    .tab.active { color: #1a56db; border-bottom: 2px solid #1a56db; font-weight: bold; }
    #chapter-tabs { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 10px; background: #f0f4ff; border-bottom: 1px solid #ddd; }
    .chapter-btn { padding: 4px 10px; font-size: 11px; border-radius: 12px; border: 1px solid #aac; background: #fff; cursor: pointer; color: #333; }
    .chapter-btn.selected { background: #1a56db; color: #fff; border-color: #1a56db; }
    #stats { padding: 5px 12px; font-size: 11px; color: #666; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: 14px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; }
    .dot-green { background: #22c55e; } .dot-grey { background: #aaa; }
    #question-list { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
    .q-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 9px 11px; cursor: pointer; transition: all 0.15s; }
    .q-card:hover { border-color: #1a56db; box-shadow: 0 1px 4px rgba(26,86,219,0.15); }
    .q-card.used { background: #f9f9f9; color: #aaa; cursor: not-allowed; }
    .q-card.used:hover { border-color: #ddd; box-shadow: none; }
    .q-id { font-size: 10px; color: #999; margin-bottom: 3px; display: flex; justify-content: space-between; }
    .badge { font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: bold; }
    .badge-available { background: #dcfce7; color: #15803d; }
    .badge-used { background: #f3f4f6; color: #999; }
    .q-text { font-size: 12px; line-height: 1.4; }
    .used-in { font-size: 10px; color: #bbb; margin-top: 2px; font-style: italic; }

    /* Generate */
    .gen-section { padding: 10px; }
    .sec-title { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin: 12px 0 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .gen-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .gen-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .gen-row:last-child { margin-bottom: 0; }
    .gen-label { font-size: 12px; color: #444; }
    .gen-input { background: #f5f5f5; border: 1px solid #ccc; border-radius: 6px; padding: 5px 8px; font-size: 12px; width: 70px; text-align: center; color: #222; outline: none; }
    .gen-input:focus { border-color: #1a56db; }
    .gen-select { background: #f5f5f5; border: 1px solid #ccc; border-radius: 6px; padding: 5px 8px; font-size: 11px; color: #222; outline: none; }
    .ch-dist-row { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
    .ch-dist-row.over { border-color: #fca5a5; background: #fff5f5; }
    .ch-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ch-dist-info { flex: 1; min-width: 0; }
    .ch-dist-name { font-size: 12px; font-weight: bold; }
    .ch-dist-avail { font-size: 10px; color: #888; }
    .stepper { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .step-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid #ccc; background: #f5f5f5; color: #333; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .step-num { width: 32px; background: #f5f5f5; border: 1px solid #ccc; border-radius: 5px; padding: 3px 4px; font-size: 12px; font-weight: bold; text-align: center; outline: none; }
    #mode-hint { font-size: 11px; color: #666; line-height: 1.6; padding: 8px 10px; background: #f0f4ff; border-radius: 6px; margin-bottom: 8px; display: none; border-left: 3px solid #1a56db; }
    #dist-badge { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; background: #dcfce7; color: #15803d; }
    #dist-badge.over { background: #fee2e2; color: #dc2626; }
    .gen-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; margin-bottom: 6px; transition: all 0.15s; }
    .gen-btn:active { transform: scale(0.97); }
    .btn-primary { background: #22c55e; color: #000; }
    .btn-secondary { background: #e5e7eb; color: #444; }
    .btn-cyan { background: #06b6d4; color: #000; }
    #paper-output { display: none; }
    .paper-preview { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
    .pp-header { background: #f0f4ff; padding: 9px 12px; border-bottom: 1px solid #ddd; }
    .pp-title { font-size: 13px; font-weight: bold; }
    .pp-meta { font-size: 11px; color: #666; margin-top: 2px; }
    .pp-q-row { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
    .pp-q-row:last-child { border-bottom: none; }
    .pp-num { font-size: 10px; color: #999; min-width: 24px; }
    .pp-text { flex: 1; color: #333; }
    .pp-ch { font-size: 10px; color: #888; background: #f5f5f5; padding: 1px 5px; border-radius: 4px; flex-shrink: 0; }
    .remove-btn { font-size: 11px; color: #dc2626; cursor: pointer; padding: 2px 5px; background: #fee2e2; border-radius: 4px; border: none; flex-shrink: 0; }
    .removed { opacity: 0.3; text-decoration: line-through; pointer-events: none; }

    #toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #1a56db; color: white; padding: 8px 18px; border-radius: 20px; font-size: 12px; display: none; z-index: 999; white-space: nowrap; }
    .empty-state { text-align: center; padding: 30px 20px; color: #999; font-size: 12px; }

    /* Force Add Popup */
    #force-popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; align-items:flex-end; justify-content:center; }
    #force-popup.open { display:flex; }
    .fp-sheet { width:100%; max-width:500px; background:#fff; border-radius:16px 16px 0 0; padding:16px; border-top:2px solid #ddd; }
    .fp-title { font-size:13px; font-weight:bold; margin-bottom:4px; }
    .fp-sub { font-size:11px; color:#888; margin-bottom:12px; line-height:1.5; }
    .fp-btns { display:flex; gap:8px; }
    .fp-btn { flex:1; padding:10px; border-radius:8px; border:none; font-size:12px; font-weight:bold; cursor:pointer; }
    .fp-cancel { background:#f0f0f0; color:#555; }
    .fp-confirm { background:#f59e0b; color:#000; }
  </style>
</head>
<body>

<div id="header">
  <h1>📚 Question Bank</h1>
  <span>Class 5 Math</span>
</div>

<div id="main-tabs">
  <div class="main-tab active" onclick="switchTab('browse', this)">🔍 Browse</div>
  <div class="main-tab" onclick="switchTab('generate', this)">⚡ Generate</div>
</div>

<!-- BROWSE PAGE -->
<div class="page active" id="page-browse">
  <div id="search-bar"><input type="text" id="search-input" placeholder="Search questions..." oninput="render()" /></div>
  <div id="paper-bar">
    <label>Paper:</label>
    <input type="text" id="paper-name" placeholder="e.g. Fractions_Test_April" />
  </div>
  <div id="filter-tabs">
    <div class="tab active" onclick="setFilter('all',this)">All</div>
    <div class="tab" onclick="setFilter('available',this)">✅ Available</div>
    <div class="tab" onclick="setFilter('used',this)">❌ Used</div>
  </div>
  <div id="chapter-tabs"></div>
  <div id="stats"></div>
  <div id="question-list"></div>
</div>

<!-- GENERATE PAGE -->
<div class="page" id="page-generate">
  <div class="gen-section">

    <div class="sec-title" style="margin-top:4px;">Paper Name</div>
    <input type="text" class="gen-input" id="gen-paper-name" placeholder="e.g. Fractions_Test_April" style="width:100%;text-align:left;padding:7px 10px;margin-bottom:8px;" />

    <div class="sec-title">Config</div>
    <div class="gen-card">
      <div class="gen-row">
        <span class="gen-label">Total Questions</span>
        <input type="number" class="gen-input" id="gen-total" value="20" min="1" max="100" oninput="onTotalChange()" />
      </div>
      <div class="gen-row">
        <span class="gen-label">Priority Mode</span>
        <select class="gen-select" id="gen-mode" onchange="onModeChange()">
          <option value="fresh">🟢 Fresh First</option>
          <option value="balanced">⚖️ Balanced</option>
          <option value="all_equal">📊 All Equal</option>
          <option value="custom">🎛️ Custom</option>
        </select>
      </div>
    </div>

    <div id="mode-hint"></div>

    <div class="sec-title">
      Chapter Distribution
      <span id="dist-badge">0/0</span>
      <button onclick="resetDist()" style="margin-left:auto;font-size:10px;padding:2px 7px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;">↺ Auto</button>
    </div>
    <div id="ch-dist-editor"></div>

    <button class="gen-btn btn-primary" onclick="generatePaper()">⚡ Generate Paper</button>

    <div id="paper-output">
      <div class="sec-title">Generated Paper</div>
      <div class="paper-preview" id="paper-preview"></div>
      <button class="gen-btn btn-cyan" onclick="insertAllToWord()">📄 Insert into Word</button>
      <button class="gen-btn btn-secondary" onclick="generatePaper()">↺ Regenerate</button>
    </div>

  </div>
</div>

<!-- Force Add Popup -->
<div id="force-popup" onclick="if(event.target===this)closeFP()">
  <div class="fp-sheet">
    <div class="fp-title">⚠️ Already Used</div>
    <div class="fp-sub" id="fp-sub">Yeh question pehle use ho chuka hai.<br/>Phir bhi current paper mein add karein?</div>
    <div class="fp-btns">
      <button class="fp-btn fp-cancel" onclick="closeFP()">Cancel</button>
      <button class="fp-btn fp-confirm" onclick="forceInsert()">Force Add</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const GH_OWNER  = "raakpk507-coder";
const GH_REPO   = "question-bank";
const GH_BRANCH = "main";
const JSON_PATH = "questions.json";
const GH_TOKEN  = "";

let allQuestions = [];
let jsonSha = "";
let currentFilter = "all";
let currentChapter = "All";
let generatedPaper = [];
let chDist = {};

const CH_COLORS = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#ec4899","#10b981"];

Office.onReady(() => { loadQuestions(); });

function switchTab(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'generate') buildDistEditor();
}

async function loadQuestions() {
  try {
    const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${JSON_PATH}?ref=${GH_BRANCH}&t=${Date.now()}`;
    const headers = { "Accept": "application/vnd.github.v3+json" };
    if (GH_TOKEN) headers["Authorization"] = `token ${GH_TOKEN}`;
    const res = await fetch(url, { headers });
    const data = await res.json();
    jsonSha = data.sha;
    const decoded = JSON.parse(atob(data.content.replace(/\n/g, "")));
    allQuestions = decoded.questions;
    buildChapterTabs();
    render();
  } catch (e) {
    document.getElementById("question-list").innerHTML = `<div class="empty-state">❌ Load failed. GitHub config check karo.</div>`;
  }
}

function buildChapterTabs() {
  const chapters = ["All", ...new Set(allQuestions.map(q => q.chapter))];
  document.getElementById("chapter-tabs").innerHTML = chapters.map(ch =>
    `<button class="chapter-btn ${ch===currentChapter?'selected':''}" onclick="setChapter('${ch}',this)">${ch}</button>`
  ).join("");
}

function setChapter(ch, btn) {
  currentChapter = ch;
  document.querySelectorAll(".chapter-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  render();
}

function setFilter(f, tab) {
  currentFilter = f;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  render();
}

function render() {
  const search = document.getElementById("search-input").value.toLowerCase();
  const filtered = allQuestions.filter(q => {
    const matchCh = currentChapter === "All" || q.chapter === currentChapter;
    const matchF  = currentFilter === "all" ? true : currentFilter === "available" ? !q.used : q.used;
    const matchS  = q.text.toLowerCase().includes(search) || q.chapter.toLowerCase().includes(search);
    return matchCh && matchF && matchS;
  });

  const total   = allQuestions.filter(q => currentChapter==="All" || q.chapter===currentChapter).length;
  const avail   = allQuestions.filter(q => (currentChapter==="All"||q.chapter===currentChapter) && !q.used).length;
  document.getElementById("stats").innerHTML =
    "<span><span class=\"dot dot-green\"></span>" + avail + " available</span>" +
    "<span><span class=\"dot dot-grey\"></span>" + (total-avail) + " used</span>" +
    "<span>Total: " + total + "</span>";

  if (!filtered.length) {
    document.getElementById("question-list").innerHTML = '<div class="empty-state">No questions found.</div>';
    return;
  }

  let html = '';
  filtered.forEach(function(q) {
    const usedBadge = q.used ? 'badge-used' : 'badge-available';
    const usedLabel = q.used ? '❌ Used' : '✅ Available';
    const usedClass = q.used ? 'used' : '';
    const usedInHtml = q.usedIn ? '<div class="used-in">Used in: ' + q.usedIn + '</div>' : '';
    html += '<div class="q-card ' + usedClass + '" data-id="' + q.id + '" data-used="' + (q.used ? 1 : 0) + '">';
    html += '<div class="q-id"><span>' + q.id + ' · ' + q.chapter + '</span>';
    html += '<span class="badge ' + usedBadge + '">' + usedLabel + '</span></div>';
    html += '<div class="q-text">' + q.text + '</div>';
    html += usedInHtml + '</div>';
  });
  document.getElementById("question-list").innerHTML = html;

  document.querySelectorAll(".q-card").forEach(function(card) {
    card.addEventListener("click", function() {
      if (card.dataset.used === "1") {
        openFP(card.dataset.id);
        return;
      }
      insertQuestion(card.dataset.id);
    });
  });
}
async function insertQuestion(id) {
  const q = allQuestions.find(x => x.id === id);
  if (!q || q.used) return;
  try {
    await Word.run(async (context) => {
      context.document.getSelection().insertOoxml(q.ooxml, Word.InsertLocation.replace);
      await context.sync();
    });
    const pname = document.getElementById("paper-name").value.trim() || "Unnamed_Paper";
    q.used = true; q.usedIn = pname;
    showToast(`✅ Inserted — ${q.id}`);
    render(); saveToGitHub();
  } catch (e) { showToast("❌ Insert failed"); }
}

// ── Generate ──────────────────────────────────────────────────────────────────

function chColor(ch) {
  const chs = [...new Set(allQuestions.map(q => q.chapter))];
  return CH_COLORS[chs.indexOf(ch) % CH_COLORS.length] || "#888";
}

function availByChapter() {
  const result = {};
  [...new Set(allQuestions.map(q => q.chapter))].forEach(ch => {
    result[ch] = allQuestions.filter(q => q.chapter === ch && !q.used).length;
  });
  return result;
}

function buildDistEditor() {
  const avail = availByChapter();
  const chapters = Object.keys(avail);
  const total = parseInt(document.getElementById("gen-total").value) || 20;
  const mode  = document.getElementById("gen-mode").value;

  if (mode !== "custom") {
    chDist = {};
    if (mode === "all_equal") {
      const each = Math.floor(total / chapters.length);
      let rem = total - each * chapters.length;
      chapters.forEach((ch, i) => { chDist[ch] = Math.min(each + (i < rem ? 1 : 0), avail[ch]); });
    } else {
      const sorted = mode === "fresh" ? [...chapters].sort((a,b)=>avail[b]-avail[a]) : chapters;
      let rem = total;
      const each = Math.floor(total / chapters.length);
      sorted.forEach((ch, i) => {
        const take = mode === "fresh"
          ? Math.min(rem, avail[ch])
          : Math.min(each + (i < (total - each*chapters.length) ? 1 : 0), avail[ch]);
        chDist[ch] = take;
        if (mode === "fresh") rem -= take;
      });
    }
  } else {
    chapters.forEach(ch => { if (!(ch in chDist)) chDist[ch] = 0; });
  }

  renderDistEditor(avail);
  updateDistBadge();
}

function renderDistEditor(avail) {
  if (!avail) avail = availByChapter();
  const isCustom = document.getElementById("gen-mode").value === "custom";
  document.getElementById("ch-dist-editor").innerHTML = Object.keys(avail).map(ch => `
    <div class="ch-dist-row ${(chDist[ch]||0)>avail[ch]?'over':''}">
      <div class="ch-dot" style="background:${chColor(ch)}"></div>
      <div class="ch-dist-info">
        <div class="ch-dist-name">${ch}</div>
        <div class="ch-dist-avail">${avail[ch]} available</div>
      </div>
      <div class="stepper">
        <button class="step-btn" ${!isCustom?'disabled':''} onclick="stepDist('${ch}',-1)">−</button>
        <input class="step-num" type="number" value="${chDist[ch]||0}" min="0" max="${avail[ch]}" ${!isCustom?'disabled':''}
          onchange="chDist['${ch}']=Math.min(parseInt(this.value)||0,${avail[ch]});updateDistBadge();renderDistEditor()">
        <button class="step-btn" ${!isCustom?'disabled':''} onclick="stepDist('${ch}',+1)">+</button>
      </div>
    </div>`).join("");
}

function stepDist(ch, delta) {
  const avail = availByChapter();
  chDist[ch] = Math.max(0, Math.min((chDist[ch]||0) + delta, avail[ch]));
  renderDistEditor(avail);
  updateDistBadge();
}

function updateDistBadge() {
  const total = parseInt(document.getElementById("gen-total").value) || 20;
  const curr  = Object.values(chDist).reduce((a,b)=>a+b,0);
  const badge = document.getElementById("dist-badge");
  badge.textContent = `${curr}/${total}`;
  badge.className   = curr > total ? "over" : "";
}

function onTotalChange() { buildDistEditor(); }

function onModeChange() {
  const mode = document.getElementById("gen-mode").value;
  const hint = document.getElementById("mode-hint");
  const hints = {
    fresh:     "🟢 Sabse zyada available chapters se pehle questions lega.",
    balanced:  "⚖️ Har chapter se roughly equal questions.",
    all_equal: "📊 Har chapter se exact same count.",
    custom:    "🎛️ Har chapter ke liye manually count set karo — stepper enable hai."
  };
  hint.textContent = hints[mode] || "";
  hint.style.display = hints[mode] ? "block" : "none";
  buildDistEditor();
}

function resetDist() { chDist = {}; buildDistEditor(); }

function generatePaper() {
  buildDistEditor();
  generatedPaper = [];
  let qNum = 1;
  Object.entries(chDist).forEach(([ch, count]) => {
    if (!count) return;
    const pool = allQuestions.filter(q => q.chapter === ch && !q.used);
    for (let i = pool.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [pool[i],pool[j]] = [pool[j],pool[i]];
    }
    pool.slice(0, count).forEach(q => { generatedPaper.push({...q, _num: qNum++}); });
  });

  if (!generatedPaper.length) { showToast("❌ Koi question available nahi!"); return; }
  renderPaperPreview();
  document.getElementById("paper-output").style.display = "block";
  showToast(`✅ ${generatedPaper.length} questions ready!`);
}

function renderPaperPreview() {
  const name = document.getElementById("gen-paper-name").value || "Paper";
  const chapters = [...new Set(generatedPaper.map(q=>q.chapter))].join(', ');
  document.getElementById("paper-preview").innerHTML = `
    <div class="pp-header">
      <div class="pp-title">📄 ${name}</div>
      <div class="pp-meta">${generatedPaper.length} questions · ${chapters}</div>
    </div>
    ${generatedPaper.map((q,i) => `
      <div class="pp-q-row" id="pprow-${q.id}">
        <span class="pp-num">Q${i+1}</span>
        <span class="pp-text">${q.text}</span>
        <span class="pp-ch">${q.chapter}</span>
        <button class="remove-btn" onclick="removeFromPaper('${q.id}')">✕</button>
      </div>`).join("")}`;
}

function removeFromPaper(id) {
  const row = document.getElementById(`pprow-${id}`);
  if (row) row.classList.add("removed");
  generatedPaper = generatedPaper.filter(q => q.id !== id);
  showToast("Removed");
}

async function insertAllToWord() {
  if (!generatedPaper.length) { showToast("❌ Pehle generate karo"); return; }
  const paperName = document.getElementById("gen-paper-name").value.trim() || "Auto_Paper";
  showToast("⏳ Inserting...");
  try {
    await Word.run(async (context) => {
      const body = context.document.body;
      for (let i = 0; i < generatedPaper.length; i++) {
        const q = generatedPaper[i];
        body.getRange(Word.RangeLocation.end).insertOoxml(q.ooxml, Word.InsertLocation.before);
        if (i < generatedPaper.length - 1)
          body.getRange(Word.RangeLocation.end).insertParagraph("", Word.InsertLocation.before);
        await context.sync();
      }
    });
    generatedPaper.forEach(q => {
      const orig = allQuestions.find(x => x.id === q.id);
      if (orig) { orig.used = true; orig.usedIn = paperName; }
    });
    showToast(`✅ ${generatedPaper.length} questions inserted!`);
    render(); saveToGitHub();
    generatedPaper = [];
    document.getElementById("paper-output").style.display = "none";
  } catch (e) { showToast("❌ Insert failed — Word open hai?"); }
}

async function saveToGitHub() {
  if (!GH_TOKEN) return;
  try {
    const payload = { meta: { class:"5", subject:"Math", lastUpdated: new Date().toISOString().split("T")[0] }, questions: allQuestions };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${JSON_PATH}`, {
      method: "PUT",
      headers: { "Authorization":`token ${GH_TOKEN}`, "Content-Type":"application/json" },
      body: JSON.stringify({ message:"Update question usage", content, sha: jsonSha, branch: GH_BRANCH })
    });
  } catch (e) {}
}

let forceQId = null;

function openFP(id) {
  const q = allQuestions.find(x => x.id === id);
  if (!q) return;
  forceQId = id;
  document.getElementById("fp-sub").innerHTML =
    "<b>" + q.text + "</b><br/><span style='color:#f59e0b'>Used in: " + (q.usedIn || "Unknown") + "</span><br/><br/>Phir bhi insert karein?";
  document.getElementById("force-popup").classList.add("open");
}

function closeFP() {
  document.getElementById("force-popup").classList.remove("open");
  forceQId = null;
}

async function forceInsert() {
  if (!forceQId) return;
  closeFP();
  const q = allQuestions.find(x => x.id === forceQId);
  if (!q) return;
  try {
    await Word.run(async (context) => {
      context.document.getSelection().insertOoxml(q.ooxml, Word.InsertLocation.replace);
      await context.sync();
    });
    showToast("✅ Force inserted — " + q.id);
  } catch(e) { showToast("❌ Insert failed"); }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}
</script>
